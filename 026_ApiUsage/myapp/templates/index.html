<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS, Email & Payment Gateway</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
        crossorigin="anonymous"></script>

    <style>
        body {
            background-color: #f4f6f9;
        }

        .main-card {
            max-width: 700px;
            margin: 40px auto;
            border-radius: 15px;
        }

        .form-control,
        .btn {
            border-radius: 10px;
        }

        textarea {
            resize: none;
        }

        .section-title {
            font-size: 22px;
            font-weight: bold;
            color: #0d6efd;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card shadow-lg main-card">
            <div class="card-body p-4">

                <h2 class="text-center text-primary mb-4">
                    Communication & Payment Panel
                </h2>

                <!-- SMS FORM -->
                <div class="mb-5">
                    <div class="section-title">Send SMS</div>

                    <form action="sendsms">

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Phone Number
                            </label>

                            <input type="text"
                                placeholder="Enter phone number"
                                name="phone"
                                class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                SMS Message
                            </label>

                            <textarea name="sms"
                                id="sms"
                                rows="4"
                                class="form-control"
                                placeholder="Enter message"></textarea>
                        </div>

                        <div class="d-grid">
                            <input type="submit"
                                value="Send SMS"
                                class="btn btn-success">
                        </div>

                    </form>
                </div>

                <hr class="my-4">

                <!-- EMAIL FORM -->
                <div class="mb-5">

                    <div class="section-title">Send Email</div>

                    <form action="sendemail">

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                To
                            </label>

                            <input type="email"
                                name="to"
                                class="form-control"
                                placeholder="Enter recipient email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Subject
                            </label>

                            <input type="text"
                                name="subject"
                                class="form-control"
                                placeholder="Enter email subject">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Content
                            </label>

                            <textarea name="content"
                                rows="5"
                                class="form-control"
                                placeholder="Enter email content"></textarea>
                        </div>

                        <div class="d-grid">
                            <input type="submit"
                                value="Send Email"
                                class="btn btn-warning">
                        </div>

                    </form>

                </div>

                <hr class="my-4">

                <!-- PAYMENT SECTION -->
                <div>

                    <div class="section-title">Razorpay Payment</div>

                    <label class="form-label fw-bold">
                        Enter Amount
                    </label>

                    <input type="text"
                        id="amt"
                        class="form-control mb-3"
                        placeholder="Enter amount">

                    <div class="d-grid">
                        <button id="rzp-button1"
                            class="btn btn-primary btn-lg">
                            Pay with Razorpay
                        </button>
                    </div>

                </div>

            </div>
        </div>

    </div>

    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <script>

        document.getElementById('rzp-button1').onclick = function (e) {

            var amt = $("#amt").val()

            e.preventDefault();

            $.get("payment", { amt }, function (rt) {

                var options = {
                    "key": "rzp_test_SrVF3qKpUUSwRy",
                    "amount": rt.amount,
                    "currency": "INR",
                    "name": "Acme Corp",
                    "description": "Test Transaction",
                    "image": "https://example.com/your_logo",
                    "order_id": rt.id,

                    "handler": function (response) {

                        alert(response.razorpay_payment_id);
                        alert(response.razorpay_order_id);
                        alert(response.razorpay_signature)

                    },

                    "prefill": {
                        "name": "keval",
                        "email": "keval@gmail.com",
                        "contact": "8200372773"
                    },

                    "notes": {
                        "address": "Razorpay Corporate Office"
                    },

                    "theme": {
                        "color": "#3399cc"
                    }
                };

                var rzp1 = new Razorpay(options);

                rzp1.on('payment.failed', function (response) {

                    alert(response.error.code);
                    alert(response.error.description);
                    alert(response.error.source);
                    alert(response.error.step);
                    alert(response.error.reason);
                    alert(response.error.metadata.order_id);
                    alert(response.error.metadata.payment_id);

                });

                rzp1.open();
            })

        }

    </script>

</body>

</html>
