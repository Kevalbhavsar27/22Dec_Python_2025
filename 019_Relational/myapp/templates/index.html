<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <!-- Form Card -->
        <div class="card shadow p-4">
            <h4 class="mb-3 text-primary">Add Product</h4>

            <form action="{%url 'addproduct'%}" method="post">
                {%csrf_token%}

                <input type="hidden" name="id" value="{{product.id}}">
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" id="category" class="form-select">
                        <option value="0">---Select Category---</option>
                        {%for i in categories%}
                        <option value="{{i.id}}" {%if i.id == product.category.id %}selected{%endif%}>{{i.name}}</option>
                        {%endfor%}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter product name"
                        value="{{product.name}}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Price</label>
                    <input type="text" name="price" class="form-control" placeholder="Enter product price"
                        value="{{product.price}}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="text" name="qty" class="form-control" placeholder="Enter Product qty"
                        value="{{product.qty}}">
                </div>

                <input type="submit" class="btn btn-primary w-100" value="Add Product">
            </form>
        </div>

        <br>
        <hr>
        <br>

        <!-- Table Card -->
        <div class="card shadow p-4">
            <h4 class="mb-3 text-success">Product List</h4>

            <div class="table-responsive">
                <table class="table table-bordered table-hover text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Id</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Qty</th>
                            <th>Category</th>
                            <th>Total</th>
                            <th colspan="2">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {%for product in products%}
                        <tr>
                            <td>{{product.id}}</td>
                            <td>{{product.name}}</td>
                            <td>{{product.price}}</td>
                            <td>{{product.qty}}</td>
                            <td>{{product.category.name}}</td>
                            <td class="fw-bold text-primary">{{product.total}}</td>
                            <td><a href="{%url 'delete'%}?id={{product.id}}" class="btn btn-danger">Delete</a></td>
                            <td><a href="{%url 'update'%}?id={{product.id}}" class="btn btn-primary">Update</a></td>
                        </tr>
                        {%endfor%}
                    </tbody>
                </table>
            </div>

        </div>

    </div>

</body>

</html>
