<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD UI</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: #f5f7fa;
        }

        .card {
            border-radius: 12px;
        }

        .table-container {
            margin-top: 30px;
        }
    </style>


    <script>

        $(document).ready(function () {
            load()
            $("#ubtn").hide()
        })

        const load = () => {

            $.get("display", {}, function (rt) {

                rows = ""
                rt.students.map(ele => {
                    rows += `<tr>
                        <td>${ele.id}</td>
                        <td>${ele.name}</td>
                        <td>${ele.email}</td>
                        <td>${ele.age}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick='edituser(${ele.id})'>Edit</button>
                            <button class="btn btn-danger btn-sm" onclick='deleteuser(${ele.id})'>Delete</button>
                        </td>
                    </tr>`
                })

                $("#tdata").html(rows)
            })
        }

        const search = (q) => {

            $.get("search", {q}, function (rt) {

                rows = ""
                rt.students.map(ele => {
                    rows += `<tr>
                        <td>${ele.id}</td>
                        <td>${ele.name}</td>
                        <td>${ele.email}</td>
                        <td>${ele.age}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick='edituser(${ele.id})'>Edit</button>
                            <button class="btn btn-danger btn-sm" onclick='deleteuser(${ele.id})'>Delete</button>
                        </td>
                    </tr>`
                })

                $("#tdata").html(rows)
            })
        }

        const adduser = () => {

            var name = $("#name").val()
            var email = $("#email").val()
            var age = $("#age").val()
            var csrfmiddlewaretoken = $('input[name="csrfmiddlewaretoken"]').val()


            $.post("adduser", { csrfmiddlewaretoken, name, email, age }, function (rt) {
                alert(rt)
                load()

                $("#name").val("")
                $("#email").val("")
                $("#age").val("")
            })
        }

        const deleteuser = (id) => {
            $.get("deleteuser", { id }, function (rt) {
                alert(rt)
                load()
            })
        }


        const edituser = (id) => {
            $.get('edituser', { id }, function (rt) {


                $("#id").val(rt.student[0].id)
                $("#name").val(rt.student[0].name)
                $("#email").val(rt.student[0].email)
                $("#age").val(rt.student[0].age)

                $("#ubtn").show()
                $("#sbtn").hide()
            })
        }


        const updateuser = () => {

            var id = $("#id").val()
            var name = $("#name").val()
            var email = $("#email").val()
            var age = $("#age").val()
            var csrfmiddlewaretoken = $('input[name="csrfmiddlewaretoken"]').val()


            $.post("updateuser", { csrfmiddlewaretoken, id, name, email, age }, function (rt) {
                alert(rt)
                load()

                $("#id").val("")
                $("#name").val("")
                $("#email").val("")
                $("#age").val("")

                $("#ubtn").hide()
                $("#sbtn").show()
            })
        }

    </script>



</head>

<body>

    <div class="container mt-5">

        <!-- Form Section -->
        <div class="card shadow p-4">
            <h3 class="mb-4 text-center">User Form</h3>

            <input type="hidden" id="id">
            <div class="row g-3 align-items-center">
                {%csrf_token%}
                <div class="col-md-3">
                    <input type="text" class="form-control" placeholder="Enter Name" id="name">
                </div>

                <div class="col-md-4">
                    <input type="email" class="form-control" placeholder="Enter Email" id="email">
                </div>

                <div class="col-md-2">
                    <input type="number" id="age" class="form-control" placeholder="Age">
                </div>

                <div class="col-md-3">
                    <button class="btn btn-primary w-100" id="sbtn" onclick="adduser()">Add User</button>



                    <button class="btn btn-primary w-100" id="ubtn" onclick="updateuser()">Update User</button>
                </div>

            </div>

        </div>

        <!-- Table Section -->
        <div class="card shadow p-4 table-container">
            <h3 class="mb-4 text-center">User Data</h3>

            <input type="text" placeholder="search" class="form-control" onkeyup="search(value)">
            <br>

            <table class="table table-bordered table-hover text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Age</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="tdata">




                </tbody>

            </table>
        </div>

    </div>

</body>

</html>
