<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="card shadow p-4">
                    <h3 class="text-center mb-4">User Form</h3>

                    <span class="text-success">{{msg}}</span>
                    <form action="" method="post" enctype="multipart/form-data">
                        {%csrf_token%}
                        <div class="mb-3">

                            <input type="hidden" class="form-control" placeholder="Enter ID" name="id"
                                value="{{student.id}}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" placeholder="Enter Name" name="name"
                                value="{{student.name}}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="Enter Email" name="email"
                                value="{{student.email}}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" placeholder="Enter Phone" name="phone"
                                value="{{student.phone}}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Profile</label>
                            <input type="file" class="form-control" name="file">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Submit</button>
                    </form>
                </div>

                <div class="card shadow mt-4 p-4">
                    <h3 class="text-center mb-4">User Data</h3>

                    <table class="table table-bordered table-striped text-center">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Image</th>
                                <th colspan="2">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {%for student in students%}
                            <tr>
                                <td>{{forloop.counter}}</td>
                                <td>{{student.name}}</td>
                                <td>{{student.email}}</td>
                                <td>{{student.phone}}</td>
                                <td><img src="media/{{student.image}}" alt="" width="100px" height="100px"></td>
                                <td><a href="{%url 'delete'%}?did={{student.id}}"
                                        onclick="return confirm('Are you sure you want to delete this?');"
                                        class="btn btn-danger">Delete</a></td>
                                <td><a href="{%url 'update'%}?uid={{student.id}}" class="btn btn-primary">Update</a>
                                </td>
                            </tr>
                            {%endfor%}

                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
