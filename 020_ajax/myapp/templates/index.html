<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>

    <script>

        $(document).ready(function () {
            countries()
        })


        const test = () => {
            var uname = $("#uname").val()

            $.get("test", { uname }, function (rt) {
                //alert(rt)
                $("#tdata").html(rt)
            })
        }

        const search = (q) => {

            $.get("search", { q }, function (rt) {
                $("#qdata").html(rt)
            })

        }

        const countries = () => {

            var options = "<option value='0'>---Select country---<option>"
            $.get("countries", {}, function (rt) {
                rt.data.map(ele => {
                    options += `<option value=${ele.id}>${ele.name}</option>`
                })
                $("#country").html(options)
            })
        }

        const states = (cid) => {
            var options = "<option value='0'>---Select states---<option>"
            $.get("states", { cid }, function (rt) {
                rt.data.map(ele => {
                    options += `<option value=${ele.id}>${ele.name}</option>`
                })
                $("#state").html(options)
            })
        }
    </script>
</head>

<body>

    <input type="text" name="uname" id="uname">
    <button onclick="test()">Submit</button>
    <div id="tdata"></div>

    <br>
    <hr>
    <br>


    <input type="text" name="search" id="search" onkeyup="search(value)">
    <div id="qdata"></div>


    <br>
    <hr>
    <br>

    <select name="country" id="country" onchange="states(value)">
    </select>

    <select name="state" id="state">
        <option value="0">---select state---</option>
    </select>


    <select name="city" id="city">
        <option value="0">---select city---</option>
    </select>





</body>

</html>
