<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Report Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
        }

        .report-card {
            max-width: 900px;
            margin: 30px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        table th,
        table td {
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="report-card">
        <h2 class="title">Student Report Card</h2>

        <!-- Student Info -->
        <div class="row mb-3">
            <div class="col-md-4">
                <strong>Name:</strong> {{marks.0.student.name}}
            </div>
            <div class="col-md-4">
                <strong>Email:</strong> {{marks.0.student.email}}
            </div>
            <div class="col-md-4">
                <strong>Age:</strong> {{marks.0.student.age}}
            </div>
        </div>

        <!-- Marks Table -->
        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Subject</th>
                    <th>Marks</th>
                </tr>
            </thead>
            <tbody>
                {%for m in marks%}
                <tr>
                    <td>{{m.subject.name}}</td>
                    <td>{{m.marks}}</td>
                </tr>
                {%endfor%}


            </tbody>
        </table>

        <!-- Total and Rank -->
        <div class="row mt-3">
            <div class="col-md-6">
                <strong>Total Marks:</strong> {{sum}}
            </div>
            <div class="col-md-6">
                <strong>Rank:</strong> {{rank}}
            </div>
        </div>
    </div>

</body>

</html>
